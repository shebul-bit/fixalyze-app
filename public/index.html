<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixalyze — Shopify CRO Audit</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f2ec;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 100px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 32px;
      color: #e8420a;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 15px;
      color: #7a7570;
      margin-bottom: 48px;
      font-weight: 300;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #0f0f0f;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #d8d3cb;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: #0f0f0f;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    input[type="text"]:focus { border-color: #e8420a; }

    button {
      width: 100%;
      padding: 15px;
      background: #e8420a;
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #c93608; }
    button:disabled { background: #ccc; cursor: not-allowed; }

    .status {
      text-align: center;
      font-size: 14px;
      color: #7a7570;
      margin-top: 16px;
      min-height: 20px;
      font-style: italic;
    }

    .error-msg {
      color: #c0392b;
      font-size: 14px;
      margin-top: 12px;
      background: #ffeaea;
      padding: 12px 16px;
      border-radius: 8px;
      display: none;
    }

    /* Result card */
    .result-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      display: none;
    }

    .result-card h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      margin-bottom: 28px;
      color: #0f0f0f;
      padding-bottom: 16px;
      border-bottom: 2px solid #f0ece4;
    }

    /* Markdown rendering styles */
    .result-body h1,
    .result-body h2,
    .result-body h3 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      color: #0f0f0f;
      margin-top: 28px;
      margin-bottom: 12px;
      font-size: 17px;
    }

    .result-body h1 { font-size: 20px; color: #e8420a; }
    .result-body h2 { font-size: 18px; border-bottom: 1px solid #f0ece4; padding-bottom: 8px; }

    .result-body p {
      font-size: 14px;
      line-height: 1.75;
      color: #333;
      margin-bottom: 12px;
    }

    .result-body strong {
      font-weight: 600;
      color: #0f0f0f;
    }

    .result-body ul, .result-body ol {
      padding-left: 20px;
      margin-bottom: 14px;
    }

    .result-body li {
      font-size: 14px;
      line-height: 1.75;
      color: #333;
      margin-bottom: 6px;
    }

    .result-body hr {
      border: none;
      border-top: 1px solid #f0ece4;
      margin: 24px 0;
    }

    .result-body blockquote {
      border-left: 3px solid #e8420a;
      padding-left: 16px;
      color: #555;
      margin: 16px 0;
      font-style: italic;
    }

    /* Score highlight */
    .score-highlight {
      background: #fff4f0;
      border: 2px solid #e8420a;
      border-radius: 12px;
      padding: 20px 24px;
      margin: 16px 0 24px;
      text-align: center;
    }

    .score-highlight .score-num {
      font-family: 'Syne', sans-serif;
      font-size: 56px;
      font-weight: 800;
      color: #e8420a;
      line-height: 1;
    }

    .score-highlight .score-label {
      font-size: 13px;
      color: #7a7570;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="logo">Fixalyze</div>
  <p class="tagline">AI-powered Shopify UX &amp; conversion audit</p>

  <div class="card">
    <label for="shopify-url">Your Shopify store URL</label>
    <input type="text" id="shopify-url" placeholder="e.g. yourstore.com" />
    <button id="analyze-btn" onclick="runAudit()">Run Free Audit</button>
    <div class="status" id="status"></div>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="result-card" id="result-card">
    <h2 id="result-title">Your Audit Results</h2>
    <div class="result-body" id="result-body"></div>
  </div>

  <!-- Marked.js for markdown rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

  <script>
    async function runAudit() {
      const url = document.getElementById('shopify-url').value.trim();
      const btn = document.getElementById('analyze-btn');
      const status = document.getElementById('status');
      const errorMsg = document.getElementById('error-msg');
      const resultCard = document.getElementById('result-card');
      const resultBody = document.getElementById('result-body');
      const resultTitle = document.getElementById('result-title');

      // Reset
      errorMsg.style.display = 'none';
      resultCard.style.display = 'none';
      errorMsg.textContent = '';

      if (!url) {
        errorMsg.textContent = 'Please enter a store URL first.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      status.textContent = 'AI is analysing your store... this takes about 20 seconds.';

      try {
        const response = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await response.json();

        if (data.error) {
          errorMsg.textContent = 'Error: ' + data.error;
          errorMsg.style.display = 'block';
        } else {
          // Render markdown properly
          resultTitle.textContent = 'Audit Results for ' + url;
          resultBody.innerHTML = marked.parse(data.result);
          resultCard.style.display = 'block';
          resultCard.scrollIntoView({ behavior: 'smooth' });
        }

      } catch (err) {
        errorMsg.textContent = 'Something went wrong. Please try again.';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        status.textContent = '';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') runAudit();
    });
  </script>

</body>
</html>
